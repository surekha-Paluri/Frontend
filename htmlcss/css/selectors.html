<!DOCTYPE html>
<html>
<head>
<style>
p {
  text-align: center;
  color: red;
} 
.center {
  text-align: center;
  color: red;
}
p.center {
  text-align: center;
  color: red;
}
</style>
</head>
<body>
<h1 class="center">Red and center-aligned heading</h1>
<p>Every paragraph will be affected by the style.</p>
<p id="para1">Me too!</p>
<p class="center">This paragraph will be red and center-aligned.</p> 
<p>And me!</p>

</body>
</html>
